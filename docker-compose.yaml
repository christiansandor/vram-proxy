services:
  vram-proxy:
    build: .
    image: vram-proxy
    container_name: vram-proxy
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5234:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      # Persist audit logs outside the container so they survive restarts.
      - ./audit_logs:/app/audit_logs
      # Docker socket mount — required for container start/stop management.
      # If you don't use `container:` blocks in config.yaml, remove this.
      - /var/run/docker.sock:/var/run/docker.sock
    # Lets the container reach services on the host (Linux).
    # On Windows/Mac Docker Desktop this is handled automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
